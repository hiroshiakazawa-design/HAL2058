<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理美容国家試験対策トレーニング</title>
    <style>
        /* 見た目を整える指示（CSS） */
        body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background-color: #f5f7fa; color: #333; line-height: 1.6; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        /* メニュー画面 */
        .menu-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 18px; font-size: 18px; background-color: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
        .menu-btn:hover { background-color: #2980b9; }
        .menu-btn span { font-size: 13px; display: block; opacity: 0.9; margin-top: 5px; }

        /* クイズ画面 */
        #quiz-screen, #score-screen { display: none; }
        .status { display: flex; justify-content: space-between; font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
        .question-text { font-weight: bold; font-size: 18px; margin-bottom: 20px; min-height: 3em; }
        .choice-btn { display: block; width: 100%; margin: 10px 0; padding: 14px; font-size: 16px; border: 2px solid #3498db; border-radius: 8px; background: white; cursor: pointer; text-align: left; }
        .choice-btn:hover { background-color: #eaf2f8; }
        #result-msg { font-weight: bold; text-align: center; font-size: 22px; margin: 15px 0; min-height: 1.5em; }
        .nav-btn { width: 100%; padding: 16px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; display: none; }

        /* 結果画面 */
        .score-box { text-align: center; padding: 30px 10px; background: #ebf5fb; border-radius: 12px; margin: 20px 0; }
        .percent { font-size: 50px; font-weight: bold; color: #e67e22; margin: 10px 0; }
        .details { font-size: 18px; color: #2c3e50; margin-bottom: 10px; }
    </style>
</head>
<body>
<div id="menu-screen">
        <h1>学習メニュー</h1>
        <div class="menu-list">
<button class="menu-btn" onclick="startQuiz('gairon')">
    1：概論、人体と水
    <span>法律・皮膚の構造・化学の基礎（45問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('yusei')">
    2：油性原料
    <span>エステル・油脂・ロウ類（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('kaimen')">
    3：界面活性剤
    <span>乳化・可溶化・石けんの仕組み（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('koubunnshi')">

    <span>天然・合成高分子、皮膜を作る成分（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('shizai')">
    5：色材
    <span>染料・顔料、酸化チタンと酸化鉄（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('koryo')">
    6：香料
    <span>天然・合成香料、動物性香料の由来（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('haigo')">
    7：配合原料
    <span>防腐剤・酸化防止剤・紫外線吸収剤・収れん剤（20問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('zakka')">
    8：雑貨原料
    <span>ネイル・まつ毛エクステ、プラスチックの基礎（10問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('senjo')">
    9：皮膚洗浄用化粧品
    <span>石けんの製法（けん化）、硬質・軟質石けんの区別（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('keshosui')">
    10：化粧水、クリーム、乳液
    <span>化粧水、クリーム、乳液(15問) </span>
</button>
<button class="menu-btn" onclick="startQuiz('treatment')">
    11：トリートメント香粧品
    <span>美白・日焼け止め（SPF/PA）・シェービング（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('makeup')">
    12：メイクアップ香粧品
    <span>ベース・ポイントメイク、成分の役割（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('shampoo')">

    <span>洗浄・保護の仕組み、セット樹脂の役割（10問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('perma')">
    14：パーマ剤
    <span>酸化・還元反応、1剤・2剤の成分と役割（15問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('haircolor')">
    15：ヘアカラー製品
    <span>酸化染毛剤、パッチテスト、脱色の仕組み（10問）</span>
</button>
<button class="menu-btn" onclick="startQuiz('ikumou')">
    16：育毛剤
    <span>脱毛の原因、育毛と発毛の分類、有効成分（10問）</span>
</button>
</div>
</div>

    <div id="quiz-screen">
        <div class="status">            
            <span id="q-number"></span>
        </div>
        <div id="question" class="question-text"></div>
        <div id="choices"></div>
        <div id="result-msg"></div>
        <button id="next-button" class="nav-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="score-screen">
        <h1>トレーニング終了！</h1>
        <div class="score-box">
            <div class="details" id="final-stats"></div>
            <div class="percent" id="final-percent"></div>
            <p id="feedback-msg" style="font-weight:bold;"></p>
        </div>
        <button class="menu-btn" style="width:100%; text-align:center;" onclick="showMenu()">メニューに戻る</button>
    </div>
</div>

    let currentQuiz = [];
    let currentIdx = 0;
    let correctCount = 0;

    function startQuiz(category) {
        currentQuiz = allQuizzes[category];
        currentIdx = 0;
        correctCount = 0;
        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("score-screen").style.display = "none";
        document.getElementById("quiz-screen").style.display = "block";
        showQuestion();
    }

    function showMenu() {
        document.getElementById("menu-screen").style.display = "block";
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("score-screen").style.display = "none";
    }

    function showQuestion() {
        const item = currentQuiz[currentIdx];
        document.getElementById("q-number").innerText = `第 ${currentIdx + 1} 問 / 全 ${currentQuiz.length} 問`;
        document.getElementById("question").innerText = item.q;
        const choicesDiv = document.getElementById("choices");
        choicesDiv.innerHTML = "";
        document.getElementById("result-msg").innerText = "";
        document.getElementById("next-button").style.display = "none";

        item.c.forEach((choice, i) => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerText = (i + 1) + ". " + choice;
            btn.onclick = () => checkAnswer(i);
            choicesDiv.appendChild(btn);
        });
    }

    function checkAnswer(selectIdx) {
        const correctIdx = currentQuiz[currentIdx].a;
        const btns = document.querySelectorAll(".choice-btn");
        btns.forEach(b => b.disabled = true);

        if (selectIdx === correctIdx) {
            document.getElementById("result-msg").innerText = "⭕️ 正解です！";
            document.getElementById("result-msg").style.color = "#27ae60";
            correctCount++;
        } else {
            document.getElementById("result-msg").innerText = "❌ 残念、不正解です";
            document.getElementById("result-msg").style.color = "#e74c3c";
            btns[selectIdx].style.borderColor = "#e74c3c";
        }
        btns[correctIdx].style.backgroundColor = "#d1f2eb";
        document.getElementById("next-button").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuiz.length) {
            showQuestion();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("score-screen").style.display = "block";

        const total = currentQuiz.length;
        const percentage = Math.round((correctCount / total) * 100);
        document.getElementById("final-stats").innerText = `正答数: ${correctCount} / 誤答数: ${total - correctCount}`;
        document.getElementById("final-percent").innerText = `${percentage}%`;

        let msg = "";
        if (percentage === 100) msg = "完璧です！素晴らしい！";
        else if (percentage >= 80) msg = "合格点です！その調子！";
        else if (percentage >= 60) msg = "あと少し！復習しましょう。";
        else msg = "もう一度資料を確認してみましょう。";
        document.getElementById("feedback-msg").innerText = msg;
    }
